version: "3.9"

services:
  backend:
    build:
      context: ./poiro-backend
      dockerfile: Dockerfile
    container_name: poiro-backend
    ports:
      - "8000:8000"
    env_file:
      - ./poiro-backend/.env
    environment:
      - FRONTEND_URL=http://localhost:3000
    volumes:
      - ./poiro-backend:/app
    restart: unless-stopped
    networks:
      - poiro-net

  frontend:
    build:
      context: ./poiro-frontend
      dockerfile: Dockerfile
    container_name: poiro-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - poiro-net

networks:
  poiro-net:
    driver: bridge
